<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Shopping Website</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #fff5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        #chat-window {
            width: 420px;
            height: 650px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #header {
            background: #dc2626;
            color: white;
            text-align: center;
            padding: 20px;
        }

        #header h1 {
            margin: 0;
            font-size: 26px;
        }

        #header p {
            margin: 5px 0 0;
            font-size: 16px;
        }

        #output {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            background: #ffffff;
        }

        .message {
            margin: 10px 0;
            padding: 10px;
            border-radius: 10px;
            max-width: 80%;
            word-wrap: break-word;
        }

        .user {
            background: #dc2626;
            color: white;
            margin-left: auto;
        }

        .bot {
            background: #f1f1f1;
            color: black;
        }

        #input-area {
            display: flex;
            padding: 10px;
            border-top: 1px solid #ddd;
            background: white;
        }

        input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            outline: none;
        }

        button {
            margin-left: 5px;
            padding: 10px 15px;
            background: #dc2626;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #b91c1c;
        }

        small {
            font-size: 10px;
            opacity: 0.8;
        }
    </style>
</head>

<body>

    <div id="chat-window">

        <div id="header">
            <h1>Online Shopping Website</h1>
            <p>Chatbot</p>
        </div>

        <div id="output">

            <div class="message bot">
                Hello! Welcome to our online shopping website. How can I help you today?
            </div>

        </div>

        <div id="input-area">

            <input type="text" id="user-msg" placeholder="Type a message...">

            <button onclick="sendMessage()">Send</button>

            <button onclick="clearChat()">Clear</button>

        </div>

    </div>

    <script>

        // TIME FUNCTION
        function getTime() {

            let now = new Date();

            let hours = now.getHours();
            let minutes = now.getMinutes();

            if (minutes < 10) {
                minutes = "0" + minutes;
            }

            return hours + ":" + minutes;
        }


        // CLEAR CHAT
        function clearChat() {

            document.getElementById("output").innerHTML = "";

        }


        // SEND MESSAGE
        async function sendMessage() {

            const input = document.getElementById('user-msg');

            const output = document.getElementById('output');

            if (!input.value.trim()) return;

            // USER MESSAGE
            output.innerHTML += `
                <div class="message user">
                    ${input.value}
                    <br>
                    <small>${getTime()}</small>
                </div>
            `;

            output.scrollTop = output.scrollHeight;

            // BOT TYPING
            output.innerHTML += `
                <div class="message bot" id="typing">
                    Bot is typing...
                </div>
            `;

            output.scrollTop = output.scrollHeight;

            try {

                const response = await fetch('/get', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: input.value
                    })
                });

                const data = await response.json();

                // REMOVE TYPING
                document.getElementById("typing").remove();

                // BOT RESPONSE
                output.innerHTML += `
                    <div class="message bot">
                        ${data.response}
                        <br>
                        <small>${getTime()}</small>
                    </div>
                `;

            } catch (error) {

                document.getElementById("typing").remove();

                output.innerHTML += `
                    <div class="message bot">
                        Server error. Please try again later.
                    </div>
                `;
            }

            input.value = "";

            output.scrollTop = output.scrollHeight;
        }


        // ENTER KEY SUPPORT
        document.getElementById("user-msg")
            .addEventListener("keypress", function (event) {

                if (event.key === "Enter") {
                    sendMessage();
                }

            });

    </script>

</body>

</html>
